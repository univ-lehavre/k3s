[project]
name = "pilotremote"
version = "0.5.0"
description = "Remote execution adapters for pilot"
requires-python = ">=3.12"
dependencies = [
    "fabric>=3.2.0",
    "grpcio>=1.60.0",
    "protobuf>=4.25.0",
    "pilotplan",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.uv.sources]
pilotplan = { workspace = true }
