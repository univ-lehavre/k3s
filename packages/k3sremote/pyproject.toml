[project]
name = "k3sremote"
version = "0.1.0"
description = "Remote execution adapters for k3sctl"
requires-python = ">=3.12"
dependencies = [
    "fabric>=3.2.0",
    "k3splan",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.uv.sources]
k3splan = { workspace = true }
