[project]
name = "k3scli"
version = "0.2.0"
description = "Command line interface for k3sctl"
requires-python = ">=3.12"
dependencies = [
    "k3splan",
    "k3sremote",
    "rich>=14.0.0",
    "typer>=0.16.0",
]

[project.scripts]
k3sctl = "k3scli.app:app"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.uv.sources]
k3splan = { workspace = true }
k3sremote = { workspace = true }

