[project]
name = "pilotcli"
version = "0.5.0"
description = "Command line interface for pilot"
requires-python = ">=3.12"
dependencies = [
    "pilotplan",
    "pilotremote",
    "rich>=14.0.0",
    "typer>=0.16.0",
]

[project.scripts]
pilot = "pilotcli.app:app"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.uv.sources]
pilotplan = { workspace = true }
pilotremote = { workspace = true }

