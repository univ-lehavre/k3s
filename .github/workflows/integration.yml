name: Integration

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  integration:
    name: Integration tests
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: latest

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: uv sync --all-packages --dev --frozen

      - name: Build test-target image
        run: docker build -t cluster-pilot-test-target docker/test-target/

      - name: Run integration tests
        run: uv run pytest tests/integration/ -v -p no:timeout
        env:
          PYTHONUNBUFFERED: "1"
