name: Checks

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  python:
    name: Python
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true

      - name: Install Python
        run: uv python install 3.12

      - name: Install Go
        uses: actions/setup-go@v6
        with:
          go-version-file: agents/k3sagent/go.mod
          cache-dependency-path: agents/k3sagent/go.mod

      - name: Install dependencies
        run: uv sync --all-packages --dev --frozen

      - name: Check format
        run: uv run ruff format --check .

      - name: Lint
        run: uv run ruff check .

      - name: Type check
        run: uv run mypy packages

      - name: Test
        run: uv run pytest

      - name: Test Go agent
        working-directory: agents/k3sagent
        run: go test ./...

      - name: Build Go agent
        working-directory: agents/k3sagent
        run: go build ./cmd/k3sagent

      - name: Build Go agent image
        run: docker build -f agents/k3sagent/Dockerfile .
