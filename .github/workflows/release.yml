name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: Commitizen bump increment
        required: false
        default: auto
        type: choice
        options:
          - auto
          - patch
          - minor
          - major

permissions:
  contents: write
  id-token: write

jobs:
  release:
    name: Bump, build, publish
    runs-on: ubuntu-latest
    environment: pypi

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Ensure release branch
        run: |
          if [ "$GITHUB_REF" != "refs/heads/main" ]; then
            echo "Release workflow must run from main."
            exit 1
          fi

      - name: Install uv
        uses: astral-sh/setup-uv@v8
        with:
          enable-cache: true

      - name: Install Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --all-packages --dev --frozen

      - name: Check format
        run: uv run ruff format --check .

      - name: Lint
        run: uv run ruff check .

      - name: Type check
        run: uv run mypy packages

      - name: Test
        run: uv run pytest

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Bump version
        run: |
          if [ "${{ inputs.bump }}" = "auto" ]; then
            uv run cz bump --yes
          else
            uv run cz bump --yes --increment "${{ inputs.bump }}"
          fi

      - name: Read version
        id: version
        run: |
          version=$(uv run python -c 'import tomllib; print(tomllib.load(open("pyproject.toml", "rb"))["project"]["version"])')
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=v$version" >> "$GITHUB_OUTPUT"

      - name: Push bump and tag
        run: |
          git push origin HEAD:main
          git push origin "${{ steps.version.outputs.tag }}"

      - name: Build distributions
        run: uv build --all-packages --out-dir dist --clear --no-create-gitignore

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@v1

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          files: dist/*
          generate_release_notes: true
