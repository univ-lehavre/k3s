name: Metadata

on:
  pull_request:

permissions:
  contents: read
  pull-requests: read

jobs:
  metadata:
    name: Metadata
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check pull request title and body
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          python scripts/check_metadata.py --label pr-title --text "$PR_TITLE"
          python scripts/check_metadata.py --label pr-body --text "$PR_BODY"

      - name: Check commit messages
        env:
          BASE_REF: ${{ github.base_ref }}
        run: |
          git log --format=%B "origin/$BASE_REF..HEAD" > /tmp/k3s-commit-messages.txt
          python scripts/check_metadata.py --label commit-messages /tmp/k3s-commit-messages.txt
