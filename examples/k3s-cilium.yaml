apiVersion: k3sctl.dev/v1alpha1
kind: Machine
metadata:
  name: prod-1
  labels:
    env: production
    role: k3s-server

spec:
  connectionRef: prod-1

  system:
    packages:
      present:
        - curl
        - iptables
        - ca-certificates

    sysctl:
      net.ipv4.ip_forward: '1'
      net.bridge.bridge-nf-call-iptables: '1'

  networking:
    cni: cilium
    cilium:
      version: '1.19.3'
      kubeProxyReplacement: true
      helmValues:
        ipam.mode: kubernetes
        k8sServiceHost: 192.0.2.10
        k8sServicePort: '6443'

  k3s:
    state: present
    role: server
    version: v1.35.3+k3s1

    install:
      channel: stable
      method: official-script

    config:
      cluster-init: true
      write-kubeconfig-mode: '0644'
      disable:
        - traefik
        - servicelb

    service:
      enabled: true
      running: true

  health:
    require:
      - ssh.available
      - system.os.supported
      - system.disk.available
      - system.memory.available
      - systemd.k3s.running
      - k3s.version.matches
      - k3s.node.ready
      - k3s.systemPods.healthy

    thresholds:
      diskFreePercent: 15
      memoryFreeMiB: 512

  execution:
    mode: transactional

    plan:
      showDiff: true
      includeNoop: false

    verify:
      afterEachAction: true
      timeoutSeconds: 120

    rollback:
      enabled: true
      on:
        - applyFailure
        - verifyFailure

      requireConfirmFor:
        - destructive
        - irreversible

      strategy: reverse-applied-actions

    journal:
      location: local
      path: .k3sctl/runs
      keep: 20
