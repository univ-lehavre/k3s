repos:
  - repo: local
    hooks:
      - id: require-work-branch
        name: require work branch
        entry: >-
          bash -c 'branch=$(git symbolic-ref --quiet --short HEAD || true);
          if [ -z "$branch" ] || [ "$branch" = "main" ] || [ "$branch" = "master" ];
          then echo "Commit refuse: creez une branche de travail avant de committer.";
          echo "Exemple: git switch -c feat/ma-branche";
          exit 1;
          fi'
        language: system
        pass_filenames: false
        stages: [pre-commit]

      - id: ruff-format-check
        name: ruff format
        entry: uv run ruff format --check .
        language: system
        pass_filenames: false
        stages: [pre-commit]

      - id: ruff-check
        name: ruff check
        entry: uv run ruff check .
        language: system
        pass_filenames: false
        stages: [pre-commit]

      - id: mypy
        name: mypy
        entry: uv run mypy packages
        language: system
        pass_filenames: false
        stages: [pre-push]

      - id: pytest
        name: pytest
        entry: uv run pytest
        language: system
        pass_filenames: false
        stages: [pre-push]

      - id: forbid-email-in-commit-message
        name: forbid email in commit message
        entry: >-
          bash -c 'if grep -Eiq
          "[[:alnum:]._%+-]+@[[:alnum:].-]+\.[[:alpha:]]{2,}" "$1";
          then echo "Commit refuse: ne mettez pas de courriel dans le message de commit.";
          exit 1;
          fi' --
        language: system
        stages: [commit-msg]

      - id: forbid-branded-commit-message
        name: forbid branded commit message
        entry: python3 scripts/check_metadata.py --label commit-message
        language: system
        stages: [commit-msg]

      - id: commitizen
        name: commitizen
        entry: uv run cz check --commit-msg-file
        language: system
        stages: [commit-msg]
