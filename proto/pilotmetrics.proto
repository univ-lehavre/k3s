syntax = "proto3";

package k3s.metrics.v1alpha1;

option go_package = "github.com/univ-lehavre/cluster-pilot/agents/pilotagent/gen/pilotmetrics/v1alpha1;pilotmetricspb";

service Metrics {
  rpc StreamCpu(CpuRequest) returns (stream CpuSample);
}

message CpuRequest {
  double interval_seconds = 1;
}

message CpuSample {
  double usage_percent = 1;
  int64 timestamp_ms = 2;
}
